<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        
        body {
            width: 300px;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .icon-circle {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }
        
        h2 {
            font-size: 18px;
            margin: 0;
            color: #22d3ee;
            letter-spacing: 0.5px;
        }
        
        p {
            font-size: 12px;
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 20px;
            font-size: 11px;
            color: #22d3ee;
            font-weight: 600;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: #22d3ee;
            border-radius: 50%;
            box-shadow: 0 0 10px #22d3ee;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        
        .footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 10px;
            color: #475569;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="icon-circle">📏</div>
        <h2>Gistav Aufmass Pro</h2>
    </div>
    
    <p>Premium-Tool für präzise Site-Messungen. Unterstützt automatische Aufteilung nach Leistungsverzeichnis (18m/8m).</p>
    
    <div class="status-pill">
        <span class="dot"></span>
        v5.7.0 Pro Aktiviert
    </div>
    
    <div class="footer">
        © 2026 Gistav Digital Engineering
    </div>
</body>
</html>
